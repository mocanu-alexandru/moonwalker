name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # buton manual de build din interfata GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necesar pentru git rev-list --count (versioning dinamic)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          # Token read-only (fine-grained, Contents:read) pt. auto-update dintr-un repo privat.
          # Setează-l în repo → Settings → Secrets and variables → Actions → MW_UPDATE_TOKEN.
          MW_UPDATE_TOKEN: ${{ secrets.MW_UPDATE_TOKEN }}

      - name: Get version name
        id: ver
        # +58 = versionBase din app/build.gradle.kts (offset după squash-ul istoricului).
        # Tag-ul TREBUIE să corespundă versionName-ului din APK ca auto-update-ul să pornească.
        run: echo "name=1.0.$(( $(git rev-list --count HEAD) + 58 ))" >> $GITHUB_OUTPUT

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/MoonWalker.apk
          mv xposedmock/build/outputs/apk/debug/xposedmock-debug.apk app/build/outputs/apk/debug/MWMockBypass.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MoonWalker
          path: |
            app/build/outputs/apk/debug/MoonWalker.apk
            app/build/outputs/apk/debug/MWMockBypass.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.name }}
          name: "Moonwalker v${{ steps.ver.outputs.name }}"
          prerelease: false
          make_latest: true
          files: |
            app/build/outputs/apk/debug/MoonWalker.apk
            app/build/outputs/apk/debug/MWMockBypass.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
